name: e-commerce application
services:
  postgres:
    container_name: postgres-sql-ecom
    image: postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: Admin@321
      PGDATA: /var/lib/postgresql/data
      POSTGRES_DB: ecom
    volumes:
      - postgres:/data/postgres
    ports:
      - "5433:5432"
    networks:
      - ecom-network
    restart: unless-stopped
  mail-dev:
    container_name: mail-dev-ecom
    image: maildev/maildev
    ports:
      - "1080:1080"
      - "1025:1025"
    networks:
      - ecom-network

networks:
  ecom-network:
    driver: bridge


volumes:
  postgres:
    driver: local
